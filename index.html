<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAC Coder Evaluation Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid #eee;
            background: #f9f9f9;
        }

        .tab-button {
            padding: 15px 25px;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 1em;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
        }

        .tab-button:hover {
            background: #f0f0f0;
        }

        .tab-button.active {
            color: #667eea;
            border-bottom-color: #667eea;
            font-weight: 600;
        }

        .tab-content {
            padding: 30px;
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .info-text {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        th {
            background: #f5f5f5;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #ddd;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background: #f9f9f9;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        select {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
        }

        button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #5568d3;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .action-buttons button {
            padding: 6px 12px;
            font-size: 0.9em;
        }

        .chart-container {
            position: relative;
            height: 400px;
            margin-bottom: 30px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .positive {
            color: #28a745;
        }

        .negative {
            color: #dc3545;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 JAC Coder Evaluation Dashboard</h1>
            <p>Track and compare agent evaluation runs</p>
        </header>

        <div class="tabs">
            <button class="tab-button active" onclick="switchTab('runs')">📋 Run List</button>
            <button class="tab-button" onclick="switchTab('compare')">⚖️ Compare Runs</button>
            <button class="tab-button" onclick="switchTab('trends')">📈 Trends</button>
        </div>

        <div id="runs" class="tab-content active">
            <h2>All Evaluation Runs</h2>
            <p class="info-text">Click a run name to rename it, or use the "Hide" button to remove it from the dashboard.</p>
            <div id="runs-table-container" class="loading">Loading runs...</div>
        </div>

        <div id="compare" class="tab-content">
            <h2>Compare Two Runs</h2>
            <div class="controls">
                <select id="run-a-select" onchange="updateComparison()">
                    <option value="">Select Run A</option>
                </select>
                <select id="run-b-select" onchange="updateComparison()">
                    <option value="">Select Run B</option>
                </select>
                <button onclick="resetComparison()">Reset</button>
            </div>
            <div id="comparison-container"></div>
        </div>

        <div id="trends" class="tab-content">
            <h2>Evaluation Trends</h2>
            <div class="chart-container">
                <canvas id="trendsChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        let allRuns = [];
        let currentChart = null;

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        function loadDashboard() {
            const container = document.getElementById('runs-table-container');
            container.innerHTML = '<p class="loading">Dashboard is ready. Trigger evaluation runs to see results here.</p>';
        }

        function resetComparison() {
            document.getElementById('run-a-select').value = '';
            document.getElementById('run-b-select').value = '';
            document.getElementById('comparison-container').innerHTML = '';
        }

        window.addEventListener('load', loadDashboard);
    </script>
</body>
</html>
