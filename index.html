<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAC Coder Evaluation Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid #eee;
            background: #f9f9f9;
        }

        .tab-button {
            padding: 15px 25px;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 1em;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
        }

        .tab-button:hover {
            background: #f0f0f0;
        }

        .tab-button.active {
            color: #667eea;
            border-bottom-color: #667eea;
            font-weight: 600;
        }

        .tab-content {
            padding: 30px;
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .info-text {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        th {
            background: #f5f5f5;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #ddd;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background: #f9f9f9;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        select {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
        }

        button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #5568d3;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .action-buttons button {
            padding: 6px 12px;
            font-size: 0.9em;
        }

        .chart-container {
            position: relative;
            height: 400px;
            margin-bottom: 30px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .positive {
            color: #28a745;
        }

        .negative {
            color: #dc3545;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 JAC Coder Evaluation Dashboard</h1>
            <p>Track and compare agent evaluation runs</p>
        </header>

        <div class="tabs">
            <button class="tab-button active" onclick="switchTab('runs')">📋 Run List</button>
            <button class="tab-button" onclick="switchTab('compare')">⚖️ Compare Runs</button>
            <button class="tab-button" onclick="switchTab('trends')">📈 Trends</button>
        </div>

        <div id="runs" class="tab-content active">
            <h2>All Evaluation Runs</h2>
            <p class="info-text">Click a run name to rename it, or use the "Hide" button to remove it from the dashboard.</p>
            <div id="runs-table-container" class="loading">Loading runs...</div>
        </div>

        <div id="compare" class="tab-content">
            <h2>Compare Two Runs</h2>
            <div class="controls">
                <select id="run-a-select" onchange="updateComparison()">
                    <option value="">Select Run A</option>
                </select>
                <select id="run-b-select" onchange="updateComparison()">
                    <option value="">Select Run B</option>
                </select>
                <button onclick="resetComparison()">Reset</button>
            </div>
            <div id="comparison-container"></div>
        </div>

        <div id="trends" class="tab-content">
            <h2>Evaluation Trends</h2>
            <div class="chart-container">
                <canvas id="trendsChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        const REPO = "sahanuday/test-workflow";
        const BRANCH = "gh-pages";
        let allRuns = [];
        let runResults = {};
        let currentChart = null;

        async function fetchJson(path) {
            const url = `https://raw.githubusercontent.com/${REPO}/${BRANCH}/${path}`;
            const response = await fetch(url);
            if (!response.ok) return null;
            return response.json();
        }

        async function loadMetadata() {
            return await fetchJson("metadata.json") || { runs: [] };
        }

        async function fetchRunResult(runId) {
            if (runResults[runId]) return runResults[runId];
            const result = await fetchJson(`runs/${runId}.json`);
            if (result) runResults[runId] = result;
            return result;
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            event.currentTarget.classList.add('active');
            if (tabName === 'trends') renderTrendsChart();
        }

        function formatDate(runId) {
            return new Date().toLocaleDateString();
        }

        function formatDuration(seconds) {
            if (!seconds) return '—';
            return seconds.toFixed(1) + 's';
        }

        function formatCost(cost) {
            if (cost === undefined || cost === null) return '—';
            return '$' + cost.toFixed(4);
        }

        async function renderRunsList() {
            const container = document.getElementById('runs-table-container');
            const metadata = await loadMetadata();
            const visibleRuns = metadata.runs.filter(r => !r.hidden);

            if (visibleRuns.length === 0) {
                container.innerHTML = '<p class="info-text">No runs yet. Trigger the eval workflow to see results here.</p>';
                return;
            }

            let html = `<table>
                <thead>
                    <tr>
                        <th>Run Name</th>
                        <th>Run ID</th>
                        <th>Score</th>
                        <th>Cost (USD)</th>
                        <th>Duration (s)</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>`;

            for (const run of visibleRuns) {
                const result = await fetchRunResult(run.run_id);
                const score = result?.score || '—';
                const cost = formatCost(result?.cost_usd);
                const duration = formatDuration(result?.duration_s);

                html += `<tr>
                    <td>
                        <span class="run-name" onclick="editRunName('${run.run_id}', this)">${run.name || '(Unnamed)'}</span>
                    </td>
                    <td><code>${run.run_id}</code></td>
                    <td>${score}</td>
                    <td>${cost}</td>
                    <td>${duration}</td>
                    <td>
                        <div class="action-buttons">
                            <button onclick="hideRun('${run.run_id}')">Hide</button>
                        </div>
                    </td>
                </tr>`;
            }

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        async function editRunName(runId, element) {
            const currentName = element.textContent === '(Unnamed)' ? '' : element.textContent;
            const newName = prompt('Enter new name for this run:', currentName);
            if (newName !== null && newName !== currentName) {
                const metadata = await loadMetadata();
                const run = metadata.runs.find(r => r.run_id === runId);
                if (run) {
                    run.name = newName;
                    await updateMetadata(metadata);
                    await renderRunsList();
                }
            }
        }

        async function hideRun(runId) {
            const metadata = await loadMetadata();
            const run = metadata.runs.find(r => r.run_id === runId);
            if (run && confirm(`Hide run "${run.name || runId}"?`)) {
                run.hidden = true;
                await updateMetadata(metadata);
                await renderRunsList();
            }
        }

        async function updateMetadata(metadata) {
            try {
                const token = prompt('GitHub token (for editing):');
                if (!token) return;

                const response = await fetch(
                    `https://api.github.com/repos/${REPO}/contents/metadata.json`,
                    {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            message: 'update: edited run metadata',
                            content: btoa(JSON.stringify(metadata, null, 2))
                        })
                    }
                );
                if (!response.ok) throw new Error('Failed to update');
                alert('Updated successfully!');
            } catch (e) {
                alert('Error updating metadata: ' + e.message);
            }
        }

        async function loadComparisonView() {
            const metadata = await loadMetadata();
            const visibleRuns = metadata.runs.filter(r => !r.hidden);

            const selectA = document.getElementById('run-a-select');
            const selectB = document.getElementById('run-b-select');
            [selectA, selectB].forEach(select => {
                select.innerHTML = '<option value="">Select Run</option>';
                visibleRuns.forEach(run => {
                    const name = run.name || `Run ${run.run_id.substring(0, 8)}`;
                    select.innerHTML += `<option value="${run.run_id}">${name}</option>`;
                });
            });

            allRuns = visibleRuns;
        }

        async function updateComparison() {
            const aId = document.getElementById('run-a-select').value;
            const bId = document.getElementById('run-b-select').value;

            if (!aId || !bId) {
                document.getElementById('comparison-container').innerHTML = '';
                return;
            }

            const resultA = await fetchRunResult(aId);
            const resultB = await fetchRunResult(bId);

            if (!resultA || !resultB) {
                document.getElementById('comparison-container').innerHTML = '<p class="error">Failed to load results</p>';
                return;
            }

            const delta = (a, b) => {
                if (a === undefined || b === undefined) return null;
                const d = b - a;
                const pct = ((d / a) * 100).toFixed(1);
                const cls = d > 0 ? 'positive' : 'negative';
                return `<span class="${cls}">${d > 0 ? '+' : ''}${d.toFixed(3)} (${pct}%)</span>`;
            };

            let html = `<table>
                <thead>
                    <tr>
                        <th>Metric</th>
                        <th>Run A</th>
                        <th>Run B</th>
                        <th>Delta</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Score</td>
                        <td>${resultA.score || '—'}</td>
                        <td>${resultB.score || '—'}</td>
                        <td>${delta(resultA.score, resultB.score) || '—'}</td>
                    </tr>
                    <tr>
                        <td>Cost (USD)</td>
                        <td>${formatCost(resultA.cost_usd)}</td>
                        <td>${formatCost(resultB.cost_usd)}</td>
                        <td>${delta(resultA.cost_usd, resultB.cost_usd) || '—'}</td>
                    </tr>
                    <tr>
                        <td>Duration (s)</td>
                        <td>${formatDuration(resultA.duration_s)}</td>
                        <td>${formatDuration(resultB.duration_s)}</td>
                        <td>${delta(resultA.duration_s, resultB.duration_s) || '—'}</td>
                    </tr>
                    <tr>
                        <td>Output Tokens</td>
                        <td>${resultA.output_tokens || '—'}</td>
                        <td>${resultB.output_tokens || '—'}</td>
                        <td>${delta(resultA.output_tokens, resultB.output_tokens) || '—'}</td>
                    </tr>
                    <tr>
                        <td>Cached Tokens</td>
                        <td>${resultA.cached_tokens || '—'}</td>
                        <td>${resultB.cached_tokens || '—'}</td>
                        <td>${delta(resultA.cached_tokens, resultB.cached_tokens) || '—'}</td>
                    </tr>
                    <tr>
                        <td>First Token Latency (s)</td>
                        <td>${formatDuration(resultA.first_token_latency_s)}</td>
                        <td>${formatDuration(resultB.first_token_latency_s)}</td>
                        <td>${delta(resultA.first_token_latency_s, resultB.first_token_latency_s) || '—'}</td>
                    </tr>
                    <tr>
                        <td>Syntax Error Rate</td>
                        <td>${(resultA.syntax_error_rate || 0).toFixed(3)}</td>
                        <td>${(resultB.syntax_error_rate || 0).toFixed(3)}</td>
                        <td>${delta(resultA.syntax_error_rate, resultB.syntax_error_rate) || '—'}</td>
                    </tr>
                </tbody>
            </table>`;

            document.getElementById('comparison-container').innerHTML = html;
        }

        function resetComparison() {
            document.getElementById('run-a-select').value = '';
            document.getElementById('run-b-select').value = '';
            document.getElementById('comparison-container').innerHTML = '';
        }

        async function renderTrendsChart() {
            const metadata = await loadMetadata();
            const visibleRuns = metadata.runs.filter(r => !r.hidden);

            const data = [];
            for (const run of visibleRuns) {
                const result = await fetchRunResult(run.run_id);
                if (result) {
                    data.push({
                        name: run.name || `Run ${run.run_id.substring(0, 8)}`,
                        score: result.score,
                        cost: result.cost_usd
                    });
                }
            }

            if (data.length === 0) return;

            const ctx = document.getElementById('trendsChart');
            if (currentChart) currentChart.destroy();

            currentChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(d => d.name),
                    datasets: [
                        {
                            label: 'Score',
                            data: data.map(d => d.score),
                            borderColor: '#667eea',
                            backgroundColor: 'rgba(102, 126, 234, 0.1)',
                            yAxisID: 'y',
                            tension: 0.4
                        },
                        {
                            label: 'Cost (USD)',
                            data: data.map(d => d.cost),
                            borderColor: '#764ba2',
                            backgroundColor: 'rgba(118, 75, 162, 0.1)',
                            yAxisID: 'y1',
                            tension: 0.4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    scales: {
                        y: { type: 'linear', display: true, position: 'left', title: { display: true, text: 'Score' } },
                        y1: { type: 'linear', display: true, position: 'right', title: { display: true, text: 'Cost (USD)' }, grid: { drawOnChartArea: false } }
                    }
                }
            });
        }

        async function loadDashboard() {
            await renderRunsList();
            await loadComparisonView();
        }

        window.addEventListener('load', loadDashboard);
    </script>
</body>
</html>
